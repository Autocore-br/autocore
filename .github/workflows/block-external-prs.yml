name: Block External Pull Requests

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize

permissions:
  pull-requests: write
  contents: read

jobs:
  block-external-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Check organization membership
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

          script: |
            const username = context.payload.pull_request.user.login;
            const org = 'Autocore-br';

            try {
              await github.rest.orgs.checkMembershipForUser({
                org,
                username
              });

              console.log(`${username} é membro da organização.`);
            } catch (error) {

              console.log(`${username} NÃO é membro da organização.`);

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: `
                🚫 Pull Requests externos não são permitidos.

                Se você encontrou um problema:
                - abra uma Issue
                - ou entre em contato com os mantenedores
                `
              });

              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                state: 'closed'
              });
            }